# @package _global_

module:
  _target_: emg2qwerty.lightning.PureTransformerCTCModule

  # ── Front-end (same as lstm.yaml — no CNN blocks) ─────────────────────────
  in_features: 528          # freq * channels = 33 * 16
  mlp_features: [384]       # matched to lstm.yaml

  # ── Transformer encoder ───────────────────────────────────────────────────
  # num_features = NUM_BANDS * mlp_features[-1] = 2 * 384 = 768
  num_heads: 4              # head_dim = 768/4 = 192
  num_transformer_layers: 2 
  dim_feedforward: 512
  transformer_dropout: 0.2  # matched to lstm dropout=0.2

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]